name: Terraform Devboxes

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-devboxes:
    name: Terraform Devboxes
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::562475404381:role/GitHubActions-OIDC
          aws-region: us-east-1
          role-session-name: GitHubActions-Terraform-Devboxes

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: devboxes
        run: terraform init

      - name: Terraform Plan
        working-directory: devboxes
        run: terraform plan -input=false

      - name: Terraform Apply
        working-directory: devboxes
        run: terraform apply -auto-approve -input=false

      - name: Export instance public IP
        working-directory: devboxes
        run: terraform output -raw instance_public_ip > instance_public_ip.txt

      - name: Upload instance IP artifact
        uses: actions/upload-artifact@v4
        with:
          name: devboxes-instance-ip
          path: devboxes/instance_public_ip.txt
